<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>certificates — Jahongir Ahmadaliev</title>
  <meta name="description" content="certificates and achievements of Jahongir Ahmadaliev">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href=https://jahongir.ru/favicon/favicon.ico rel=icon type=image/x-icon>
  <link href=https://jahongir.ru/favicon/favicon-16x16.png rel=icon sizes=16x16 type=image/png>
  <link href=https://jahongir.ru/favicon/favicon-32x32.png rel=icon sizes=32x32 type=image/png>
  <link href=https://jahongir.ru/favicon/apple-touch-icon.png rel=apple-touch-icon sizes=180x180>
  <link href="https://fonts.googleapis.com/css2?family=Science+Gothic&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #2C2C2C;
      --surface:  #383838;
      --border:   #444444;
      --border-h: #606060;
      --text:     #F0F0F0;
      --muted:    #888888;
      --r:        5px;
    }

    html, body { overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Science Gothic', 'Segoe UI', system-ui, sans-serif;
      font-optical-sizing: auto;
      font-variation-settings: "slnt" 0, "wdth" 100, "CTRS" 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    nav { display: flex; gap: 2rem; flex-wrap: wrap; }

    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    .hero { margin-bottom: 2.5rem; }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.4rem;
      font-variation-settings: "slnt" 0, "wdth" 110, "CTRS" 0;
    }

    .sub {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter {
      padding: 0.3rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      font-variation-settings: "slnt" 0, "wdth" 100, "CTRS" 0;
    }

    .filter:hover { color: var(--text); border-color: var(--border-h); }
    .filter.on { color: var(--text); border-color: var(--border-h); background: var(--surface); }

    .list {
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .item {
      display: grid;
      grid-template-columns: 84px 1fr 20px;
      align-items: center;
      gap: 1.5rem;
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: transparent;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .item:last-child { border-bottom: none; }
    .item:hover { background: var(--surface); }
    .item:hover .arr { opacity: 1; transform: translateX(3px); }

    .cat {
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .name {
      font-size: 0.87rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .arr {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: monospace;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .state {
      padding: 2.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }

    .state a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    .state a:hover { color: var(--text); }

    .spin {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 580px) {
      .page { padding: 2rem 1.25rem 4rem; }
      header { margin-bottom: 3rem; }
      h1 { font-size: 1.75rem; }
      .item { grid-template-columns: 1fr; gap: 0.2rem; padding: 0.9rem 1rem; }
      .arr { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <a class="logo" href="https://jahongir.ru">Jahongir Ahmadaliev</a>
    <nav>
      <a href="https://jahongir.ru">home</a>
      <a href="https://github.com/j4hongir/certs" target="_blank" rel="noopener">gitHub</a>
    </nav>
  </header>

  <div class="hero">
    <h1>certs</h1>
    <p class="sub">courses, achievements &amp; resume</p>
  </div>

  <div class="filters" id="filters"></div>
  <div class="list" id="list"><div class="state"><span class="spin"></span>Loading...</div></div>

  <!-- <footer> -->
  <!--   <a href="https://jahongir.ru">jahongir.ru</a> -->
  <!-- </footer> -->

</div>
<script>
// ── config ────────────────────────────────────────────────────────────
const OWNER  = 'j4hongir';
const REPO   = 'certs';
const BRANCH = 'main';
const DIR    = '/';
const SKIP   = new Set(['index.html']);

const API = path =>
  `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
const GH = path =>
  `https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${path}`;
// ─────────────────────────────────────────────────────────────────────

const listEl    = document.getElementById('list');
const filtersEl = document.getElementById('filters');
let all    = [];
let active = 'all';

const label = s => s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
const title = s => s.replace(/\.pdf$/i, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).trim();

async function get(path) {
  const r = await fetch(API(path), { headers: { Accept: 'application/vnd.github.v3+json' } });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function load() {
  try {
    const root = await get(DIR);
    const dirs = root.filter(f => f.type === 'dir' && !SKIP.has(f.name));

    all = (await Promise.all(
      dirs.map(async d => {
        try {
          const files = await get(`${DIR}/${d.name}`);
          return files
            .filter(f => f.type === 'file' && f.name.toLowerCase().endsWith('.pdf'))
            .map(f => ({ cat: d.name, file: f.name }));
        } catch { return []; }
      })
    )).flat();

    buildFilters();
    render();
  } catch {
    listEl.innerHTML = `<div class="state">
      Could not load data.
      <a href="https://github.com/${OWNER}/${REPO}/tree/${BRANCH}/${DIR}" target="_blank">View on GitHub</a>
    </div>`;
  }
}

function buildFilters() {
  const cats = [...new Set(all.map(i => i.cat))];
  filtersEl.innerHTML = '';

  const make = (cat, text, on) => {
    const b = document.createElement('button');
    b.className = 'filter' + (on ? ' on' : '');
    b.dataset.cat = cat;
    b.textContent = text;
    return b;
  };

  filtersEl.appendChild(make('all', 'All', true));
  cats.forEach(c => filtersEl.appendChild(make(c, label(c), false)));

  filtersEl.addEventListener('click', e => {
    const b = e.target.closest('.filter');
    if (!b) return;
    filtersEl.querySelectorAll('.filter').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    active = b.dataset.cat;
    render();
  });
}

function render() {
  const items = active === 'all' ? all : all.filter(i => i.cat === active);

  if (!items.length) {
    listEl.innerHTML = '<div class="state">Nothing here yet.</div>';
    return;
  }

  listEl.innerHTML = '';
  items.forEach(({ cat, file }) => {
    const a = document.createElement('a');
    a.className = 'item';
    a.href = GH(`${DIR}/${cat}/${file}`);
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <span class="cat">${label(cat)}</span>
      <span class="name">${title(file)}</span>
      <span class="arr">-></span>
    `;
    listEl.appendChild(a);
  });
}

load();
</script>
</body>
</html>
